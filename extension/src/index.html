<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <meta http-equiv="X-UA-Compatible" content="IE=edge" />
        <link
            rel="apple-touch-icon"
            sizes="180x180"
            href="./assets/favicon/apple-touch-icon.png"
        />
        <link
            rel="icon"
            type="image/png"
            sizes="32x32"
            href="./assets/favicon/favicon-32x32.png"
        />
        <link
            rel="icon"
            type="image/png"
            sizes="16x16"
            href="./assets/favicon/favicon-16x16.png"
        />
        <link rel="manifest" href="./assets/favicon/site.webmanifest" />
        <title>TIPS Contest Platform | Multiplayer rooms for LeetCode</title>
    </head>
    <body>
        <script>
            const tipsboardAuthParams = new URLSearchParams(
                window.location.search
            );
            if (tipsboardAuthParams.get("auth") === "success") {
                window.close();
                document.documentElement.innerHTML =
                    '<body style="margin:0;background:#282828;color:#f5f5f5;font-family:system-ui,-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif;display:grid;min-height:100vh;place-items:center;"><div style="text-align:center;"><strong>Signed in successfully.</strong><br /><span style="color:#b5b5b5;">You can close this tab.</span></div></body>';
            }

            try {
                const tipsboardDarkMode =
                    localStorage.getItem("tipsboardDarkMode");
                if (tipsboardDarkMode === "true" || !tipsboardDarkMode) {
                    document.body.classList.add("dark");
                } else {
                    document.body.classList.remove("dark");
                }
            } catch (error) {
                document.body.classList.add("dark");
                console.error(
                    "Unable to read from local storage while third-party cookies are disabled"
                );
            }

            window.addEventListener("message", (event) => {
                if (
                    event.data?.extension !== "tipsboard" ||
                    !("isDarkMode" in event.data)
                ) {
                    return;
                }
                try {
                    if (event.data.isDarkMode) {
                        document.body.classList.add("dark");
                        localStorage.setItem("tipsboardDarkMode", "true");
                    } else {
                        document.body.classList.remove("dark");
                        localStorage.setItem("tipsboardDarkMode", "false");
                    }
                } catch (error) {
                    console.error("Unable to write to local storage");
                }
            });
        </script>
        <div id="tipsboard-root"></div>
        <script type="module" src="./main.tsx"></script>
    </body>
</html>
